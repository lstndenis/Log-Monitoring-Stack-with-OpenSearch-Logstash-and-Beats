input {
  syslog {
    port => 5514
  }
  beats {
    port => 5044
  }
}

filter {
  #################################################
  # SSH SUCCESS (Accepted password/publickey)
  #################################################
  if "Accepted password" in [message] or "Accepted publickey" in [message] {
    grok {
      match => {
        "message" => "Accepted %{WORD:[auth][method]} for %{USERNAME:[user][name]} from %{IP:[source][ip]}( port %{NUMBER:[source][port]:int})?( ssh2)?"
      }
      tag_on_failure => ["ssh_parse_fail"]
    }
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][action]"   => "ssh_login"
        "[event][outcome]"   => "success"
      }
    }
  }

  #################################################
  # SSH FAILED (Failed password)
  #################################################
  if "Failed password" in [message] {
    grok {
      match => {
        "message" => "Failed password for (invalid user )?%{USERNAME:[user][name]} from %{IP:[source][ip]}( port %{NUMBER:[source][port]:int})?( ssh2)?"
      }
      tag_on_failure => ["ssh_failed_parse"]
    }
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][action]"   => "ssh_login_failed"
        "[event][outcome]"   => "failure"
      }
    }
  }

  #################################################
  # SSH FAILED через PAM (authentication failure)
  #################################################
  if "authentication failure" in [message] and "sshd" in [message] {
    grok {
      match => {
        "message" => "rhost=%{IP:[source][ip]}.*user=%{USERNAME:[user][name]}"
      }
      tag_on_failure => ["ssh_pam_parse_fail"]
    }
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][action]"   => "ssh_login_failed"
        "[event][outcome]"   => "failure"
      }
    }
  }

  #################################################
  # SUDO (privilege escalation)
  #################################################
  if "sudo" in [message] {
    grok {
      match => {
        "message" => [
          "%{USERNAME:[user][name]} : TTY=%{DATA} ; PWD=%{DATA} ; USER=%{USERNAME:[user][target][name]} ; COMMAND=%{GREEDYDATA:[process][command_line]}",
          "sudo\\[%{NUMBER:[process][pid]}\\]: pam_unix\\(sudo%{DATA:[sudo][pam_facility]}:session\\): session opened for user %{USERNAME:[user][target][name]}\\(uid=%{NUMBER:[user][target][id]}\\) by %{USERNAME:[user][name]}\\(uid=%{NUMBER:[user][id]}\\)",
          "sudo\\[%{NUMBER:[process][pid]}\\]: pam_unix\\(sudo%{DATA:[sudo][pam_facility]}:session\\): session opened for user %{USERNAME:[user][target][name]}\\(uid=%{NUMBER:[user][target][id]}\\) by %{DATA}",
          "sudo\\[%{NUMBER:[process][pid]}\\]: pam_unix\\(sudo%{DATA:[sudo][pam_facility]}:session\\): session closed for user %{USERNAME:[user][target][name]}"
        ]
      }
      tag_on_failure => ["sudo_parse_fail"]
    }

    if [process][command_line] {
      ruby {
        code => '
          cmd = event.get("[process][command_line]")
          if cmd
            parts = cmd.split(" ")
            event.set("CommandLine", cmd)
            event.set("Image", parts[0])
          end
        '
      }
    }

    mutate {
      add_field => {
        "[event][category]" => "iam"
        "[event][outcome]"  => "success"
      }
    }

    if "session opened" in [message] {
      mutate { add_field => { "[event][action]" => "sudo_session_opened" } }
    } else if "session closed" in [message] {
      mutate { add_field => { "[event][action]" => "sudo_session_closed" } }
    } else {
      mutate { add_field => { "[event][action]" => "sudo" } }
    }
  }

  #################################################
  # WINDOWS: normalize user fields
  #################################################
  if [winlog][event_data][TargetUserName] and [winlog][event_data][TargetUserName] != "-" {
    mutate {
      rename => { "[winlog][event_data][TargetUserName]" => "[user][name]" }
    }
  }

  if [winlog][event_data][SubjectUserName] and [winlog][event_data][SubjectUserName] != "-" {
    mutate {
      add_field => { "[user][name]" => "%{[winlog][event_data][SubjectUserName]}" }
    }
  }

  #################################################
  # 4624 - successful logon
  #################################################
  if [winlog][event_id] == "4624" or [winlog][event_id] == 4624 {
    if [winlog][event_data][LogonType] == "2" or [winlog][event_data][LogonType] == "10" {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][action]"   => "local_login"
          "[event][outcome]"  => "success"
        }
      }
      if [winlog][event_data][TargetUserName] and [winlog][event_data][TargetUserName] != "-" {
        mutate {
          replace => { "[user][name]" => "%{[winlog][event_data][TargetUserName]}" }
        }
      }
    }
  }

  #################################################
  # 4798 - group membership enumeration
  #################################################
  if [winlog][event_id] == "4798" or [winlog][event_id] == 4798 {
    mutate {
      add_field => {
        "[event][category]" => "iam"
        "[event][action]"   => "group-member-enumeration"
        "[event][outcome]"  => "success"
      }
    }
    if [winlog][event_data][TargetUserName] and [winlog][event_data][TargetUserName] != "-" {
      mutate {
        add_field => { "[user][roles]" => "%{[winlog][event_data][TargetUserName]}" }
      }
    }
  }

  #################################################
  # 4688 - process creation
  #################################################
  if [winlog][event_id] == "4688" or [winlog][event_id] == 4688 {
    mutate {
      rename => {
        "[winlog][event_data][NewProcessName]" => "[process][executable]"
        "[winlog][event_data][CommandLine]"    => "[process][command_line]"
        "[winlog][event_data][SubjectUserName]" => "[user][name]"
      }
      add_field => {
        "[event][category]" => "process"
        "[event][action]"   => "process_start"
        "[event][outcome]"  => "success"
      }
    }

    if ![process][executable] and [winlog][event_data][NewProcessName] {
      mutate {
        add_field => { "[process][executable]" => "%{[winlog][event_data][NewProcessName]}" }
      }
    }

    if ![process][command_line] and [winlog][event_data][CommandLine] {
      mutate {
        add_field => { "[process][command_line]" => "%{[winlog][event_data][CommandLine]}" }
      }
    }
  }
}
output {
  if [@metadata][beat] == "winlogbeat" {
    opensearch {
      hosts => ["https://opensearch:9200"]
      user => "admin"
      password => "Admin123!Strong"
      ssl => true
      ssl_certificate_verification => false
      index => "winlogbeat-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][beat] == "filebeat" {
    opensearch {
      hosts => ["https://opensearch:9200"]
      user => "admin"
      password => "Admin123!Strong"
      ssl => true
      ssl_certificate_verification => false
      index => "filebeat-%{+YYYY.MM.dd}"
    }
  } else {
    opensearch {
      hosts => ["https://opensearch:9200"]
      user => "admin"
      password => "Admin123!Strong"
      ssl => true
      ssl_certificate_verification => false
      index => "syslog-%{+YYYY.MM.dd}"
    }
  }
}
